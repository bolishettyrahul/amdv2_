name: Build and Push Docker Image

on:
  push:
    branches: [testing, main]
    paths:
      - "Dockerfile"
      - "requirements.txt"
      - "router/**"
      - "scripts/**"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish"
        required: false
        default: "v3"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          # single clean manifest: no provenance/SBOM "unknown/unknown" entries
          provenance: false
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/amdv2:${{ github.event.inputs.tag || 'v3' }}
            ghcr.io/${{ github.repository_owner }}/amdv2:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
